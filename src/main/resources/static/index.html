<!DOCTYPE html>
<html>
<head>
    <title>Task Manager</title>
    <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg,#38bdf8,#a855f7);
        }

        .card {
            width: 400px;
            padding: 25px;
            border-radius: 15px;
            background: rgba(15,23,42,0.9);
            color: white;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tabs button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .tabs .active {
            background: linear-gradient(45deg,#38bdf8,#a855f7);
        }

        input {
            width: 100%;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
        }

        .role-btn.active {
            background: linear-gradient(45deg,#38bdf8,#a855f7);
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg,#38bdf8,#a855f7);
            color: white;
        }
    </style>
</head>

<body>

<div class="card">

    <h3 class="text-center">🚀 Task Manager</h3>

    <!-- Tabs -->
    <div class="tabs">
        <button id="loginBtn" class="active" onclick="showTab('login')">Login</button>
        <button id="signupBtn" onclick="showTab('signup')">Signup</button>
    </div>

    <!-- LOGIN -->
    <div id="loginTab">
        <input id="loginEmail" placeholder="Email">
        <input id="loginPassword" type="password" placeholder="Password">

        <button class="submit-btn" onclick="login()">Login</button>
    </div>

    <!-- SIGNUP -->
    <div id="signupTab" style="display:none;">
        <input id="name" placeholder="Name">
        <input id="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button type="button" class="role-btn" onclick="selectRole('ADMIN', this)">ADMIN</button>
            <button type="button" class="role-btn" onclick="selectRole('MEMBER', this)">MEMBER</button>
        </div>

        <button class="submit-btn" onclick="signup()">Create Account</button>
    </div>

</div>

<script>

let selectedRole = "";

// TAB SWITCH
function showTab(tab) {
    loginTab.style.display = tab === "login" ? "block" : "none";
    signupTab.style.display = tab === "signup" ? "block" : "none";

    loginBtn.classList.toggle("active", tab === "login");
    signupBtn.classList.toggle("active", tab === "signup");
}

// ROLE SELECT
function selectRole(role, el) {
    selectedRole = role;

    document.querySelectorAll(".role-btn").forEach(btn => btn.classList.remove("active"));
    el.classList.add("active");
}

// SIGNUP
function signup() {

    const nameVal = document.getElementById("name").value.trim();
    const emailVal = document.getElementById("email").value.trim();
    const passwordVal = document.getElementById("password").value.trim();

    console.log(nameVal, emailVal, passwordVal, selectedRole); // DEBUG

    if (!nameVal || !emailVal || !passwordVal) {
        Swal.fire("Error", "All fields required", "error");
        return;
    }

    if (!selectedRole) {
        Swal.fire("Error", "Please select role", "warning");
        return;
    }

    fetch("/auth/signup", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            name: nameVal,
            email: emailVal,
            password: passwordVal,
            role: selectedRole
        })
    })
    .then(res => res.json())
    .then(data => {
        console.log("Response:", data);

        if (data.role) {
            Swal.fire("Success", "Account created", "success")
            .then(() => showTab("login"));
        } else {
            Swal.fire("Error", data.message || "Signup failed", "error");
        }
    })
    .catch(() => {
        Swal.fire("Error", "Server error", "error");
    });
}
// LOGIN
function login() {

    const emailVal = document.getElementById("loginEmail").value.trim();
    const passwordVal = document.getElementById("loginPassword").value.trim();

    if (!emailVal || !passwordVal) {
        Swal.fire("Error", "Email & Password required", "error");
        return;
    }

    fetch("/auth/login", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            email: emailVal,
            password: passwordVal
        })
    })
    .then(async res => {
        const data = await res.json();

        if (!res.ok) {
            Swal.fire("Error", data.message, "error");
            return;
        }

        localStorage.setItem("user", JSON.stringify(data));
        window.location.href = "auth.html";
    });
}
</script>

</body>
</html>
